name: Deploy Soundboard to Production

on:
  push:
    branches:
      - main

jobs:
  deploy-soundboard:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🧰 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📄 Write .env.production
        run: |
          echo "${{ secrets.PROD_ENV_PRODUCTION }}" > .env.production
          echo 'RESEND_FROM="Soundboard Lab <support@soundboardlab.com>"' >> .env.production

      - name: 📦 Install dependencies and build Soundboard locally
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_PRICE_ID }}
          NEXT_PUBLIC_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_PUBLIC_URL }}
        run: |
          npm ci
          npx prisma generate
          npm run build -- --no-lint

      - name: 🚀 Deploy Soundboard to Production Droplet
        env:
          HOST: ${{ secrets.DROPLET_HOST }}
          USERNAME: ${{ secrets.DROPLET_USER }}
          PRIVATE_KEY: ${{ secrets.DROPLET_PRIVATE_KEY }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem

          echo "🔹 SSH connection test..."
          ssh -o StrictHostKeyChecking=no -i private_key.pem $USERNAME@$HOST "echo '✅ SSH connected'"

          echo "🔹 Prepare prod folder..."
          ssh -o StrictHostKeyChecking=no -i private_key.pem $USERNAME@$HOST "
            mkdir -p $REMOTE_PATH &&
            sudo chown -R $USERNAME:$USERNAME $REMOTE_PATH
          "

          echo "🔹 Upload .next build..."
          rsync -avz --delete \
            -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            .next/ $USERNAME@$HOST:$REMOTE_PATH/.next/

          echo "🔹 Upload project files (incl. prisma schema + migrations)..."
          rsync -avz --exclude=node_modules --exclude=private_key.pem \
            -e "ssh -i private_key.pem -o StrictHostKeyChecking=no" \
            public prisma package.json package-lock.json .env.production \
            $USERNAME@$HOST:$REMOTE_PATH

          echo "🔹 Install deps, run migrations & restart Soundboard..."
          ssh -o StrictHostKeyChecking=no -i private_key.pem $USERNAME@$HOST "
            cd $REMOTE_PATH &&
            cp -f .env.production .env &&
            npm ci &&
            npx prisma migrate deploy &&
            npx prisma generate &&
            pm2 delete soundboard || true &&
            PORT=3001 pm2 start npm --name soundboard --update-env -- run start &&
            pm2 save
          "

      - name: 🧹 Clean up
        if: always()
        run: rm -f private_key.pem
